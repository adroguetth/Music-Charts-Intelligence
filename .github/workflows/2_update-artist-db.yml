name: 2- Update Artist Database

on:
  schedule:
    # Ejecutar cada martes a las 02:00 UTC (después de la descarga del lunes)
    - cron: '0 2 * * 2'
  
  # Permitir ejecución manual
  workflow_dispatch:
  
  # Ejecutar después de que download-chart.yml termine exitosamente
  workflow_run:
    workflows: ["Download YouTube Chart"]
    types:
      - completed
    branches:
      - main

env:
  RETENTION_DAYS: 30

jobs:
  build-artist-db:
    name: Build and Update Artist Database
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    permissions:
      contents: write
    
    steps:
    - name: 📚 Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Historia completa para operaciones git
    
    - name: 🐍 Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: 'pip'
    
    - name: 📦 Install dependencies
      run: |
        pip install -r requirements.txt
        # Playwright no es necesario para este script, pero si se requiere, se instala
        # python -m playwright install chromium
        # python -m playwright install-deps
    
    - name: 📁 Ensure directories exist
      run: |
        mkdir -p charts_archive/1_download-chart/databases
        mkdir -p charts_archive/2_artist_countries_genres
    
    - name: 🚀 Run artist database builder
      run: |
        python scripts/2_build_artist_db.py
      env:
        GITHUB_ACTIONS: true
        # Si se necesitan tokens para APIs, se pueden agregar como secrets
        # EJEMPLO: MUSICBRAINZ_TOKEN: ${{ secrets.MUSICBRAINZ_TOKEN }}
    
    - name: ✅ Verify results
      run: |
        echo "📊 Verifying artist database..."
        ls -lah charts_archive/2_artist_countries_genres/
        echo "📈 Database size:"
        if [ -f charts_archive/2_artist_countries_genres/artist_countries_genres.db ]; then
          stat -c '%s bytes' charts_archive/2_artist_countries_genres/artist_countries_genres.db
        else
          echo "❌ Database not found!"
          exit 1
        fi
    
    - name: 📤 Commit and push changes
      run: |
        echo "📝 Preparing commit..."
        
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        git add charts_archive/2_artist_countries_genres/
        
        if git diff --cached --quiet; then
          echo "🔭 No changes to commit"
        else
          DATE=$(date +'%Y-%m-%d')
          git commit -m "🤖 Update artist database ${DATE} [Automated]"
          
          # Actualizar con los últimos cambios remotos (rebase para evitar merges)
          echo "⬇️ Pulling latest changes with rebase..."
          git pull --rebase origin main
          
          echo "⬆️ Pushing changes to repository..."
          git push origin HEAD:main
          echo "✅ Changes pushed successfully"
        fi
    
    - name: 📦 Upload artifacts (on failure)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: artist-db-debug-${{ github.run_number }}
        path: |
          charts_archive/
        retention-days: 7
    
    - name: 📋 Final report
      if: always()
      run: |
        echo "========================================"
        echo "🎵 FINAL EXECUTION REPORT"
        echo "========================================"
        echo "📅 Date: $(date)"
        echo "📌 Trigger: ${{ github.event_name }}"
        echo "🔗 Commit: ${{ github.sha }}"
        echo ""
        
        DB_FILE="charts_archive/2_artist_countries_genres/artist_countries_genres.db"
        if [ -f "$DB_FILE" ]; then
          SIZE=$(stat -c%s "$DB_FILE")
          echo "✅ Artist database size: $((SIZE / 1024)) KB"
        fi
        
        echo ""
        echo "✅ Process completed"
        echo "========================================"
