name: 5 - Export Notebook to PDF and Drive

on:
  workflow_dispatch:  # Solo manual por ahora

jobs:
  export-pdf:
    name: Convertir notebook a PDF y subir a Drive
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📚 Checkout repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📦 Instalar dependencias
        run: |
          pip install --upgrade pip
          pip install jupyter nbconvert playwright google-api-python-client google-auth-oauthlib
          playwright install chromium

      - name: 🚀 Ejecutar exportador
        run: python scripts/5_export_notebook_to_pdf.py
        env:
          GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
          GDRIVE_REFRESH_TOKEN: ${{ secrets.GDRIVE_REFRESH_TOKEN }}
          GDRIVE_ROOT_FOLDER_ID: ${{ secrets.GDRIVE_ROOT_FOLDER_ID }}

      - name: 🧹 Limpiar archivos temporales
        if: always()
        run: rm -rf temp_pdf/
