name: Export Notebooks to PDF and Upload to Drive

on:
  schedule:
    # Ejecutar todos los martes a las 12:00 UTC
    - cron: '0 12 * * 2'
  workflow_dispatch:
    inputs:
      week:
        description: 'Semana a exportar (formato YYYY-WXX). Dejar vacío para auto-detectar la más reciente.'
        required: false
        default: ''
      language:
        description: 'Idioma a exportar'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - en
          - es

env:
  RETENTION_DAYS: 30

jobs:
  export-and-upload:
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install jupyter nbconvert playwright google-api-python-client google-auth-oauthlib
          playwright install chromium

      - name: Debug - Check notebook directories
        run: |
          echo "📁 Verificando directorios de notebooks..."
          echo ""
          if [ -d "Notebook_EN/weekly" ]; then
            echo "✅ Notebook_EN/weekly existe"
            echo "   Archivos encontrados:"
            ls -la Notebook_EN/weekly/*.ipynb 2>/dev/null | head -5 || echo "   (sin archivos .ipynb)"
          else
            echo "⚠️ Notebook_EN/weekly no encontrado"
          fi
          echo ""
          if [ -d "Notebook_ES/weekly" ]; then
            echo "✅ Notebook_ES/weekly existe"
            echo "   Archivos encontrados:"
            ls -la Notebook_ES/weekly/*.ipynb 2>/dev/null | head -5 || echo "   (sin archivos .ipynb)"
          else
            echo "⚠️ Notebook_ES/weekly no encontrado"
          fi
          echo ""

      - name: Run export script
        env:
          GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
          GDRIVE_REFRESH_TOKEN: ${{ secrets.GDRIVE_REFRESH_TOKEN }}
          GDRIVE_ROOT_FOLDER_ID: ${{ secrets.GDRIVE_ROOT_FOLDER_ID }}
          EXPORT_WEEK: ${{ github.event.inputs.week || '' }}
          EXPORT_LANGUAGE: ${{ github.event.inputs.language || 'both' }}
        run: |
          python scripts/5_export_notebook_to_pdf.py

      - name: Upload artifacts (for debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: export-pdfs-${{ github.run_id }}
          path: |
            temp_pdf/
            *.log
          retention-days: ${{ env.RETENTION_DAYS }}
          if-no-files-found: ignore
          compression-level: 6
          overwrite: true

      - name: Cleanup temporary files
        if: always()
        run: |
          rm -rf temp_pdf/
          rm -f *.log

      - name: Export summary
        if: always()
        run: |
          echo "========================================"
          echo "📤 REPORTE DE EXPORTACIÓN"
          echo "========================================"
          echo "📅 Fecha: $(date)"
          echo "📌 Trigger: ${{ github.event_name }}"
          echo ""
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "   • Activado por: Cron programado (martes 12:00 UTC)"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "   • Activado por: Ejecución manual"
            echo "   • Semana especificada: ${{ github.event.inputs.week || 'auto-detección' }}"
            echo "   • Idioma especificado: ${{ github.event.inputs.language || 'both' }}"
          fi
          echo ""
          echo "📁 Notebooks en el repositorio:"
          echo "   EN: $(ls Notebook_EN/weekly/*.ipynb 2>/dev/null | wc -l) archivos"
          echo "   ES: $(ls Notebook_ES/weekly/*.ipynb 2>/dev/null | wc -l) archivos"
          echo ""
          echo "✅ Proceso completado"
          echo "========================================"
