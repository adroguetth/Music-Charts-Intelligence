name: 2.2 - Build Song Catalog

on:
  schedule:
    # Run every Monday at 13:15 UTC (after download workflow completes)
    - cron: '15 13 * * 1'
  
  workflow_dispatch:
  
  # Trigger when weekly databases are updated
  push:
    branches:
      - main
    paths:
      - 'charts_archive/1_download-chart/databases/*.db'
      - 'scripts/2_2.build_song_catalog.py'
      - '.github/workflows/2_2.build_song_catalog.yml'

env:
  RETENTION_DAYS: 30

jobs:
  build-catalog:
    name: Build Song Catalog
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    permissions:
      contents: write
    
    steps:
    - name: 📚 Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: 🐍 Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: 'pip'
    
    - name: 📦 Install dependencies
      run: |
        # No external dependencies required - only Python stdlib
        echo "No external dependencies required"
    
    - name: 📁 Create directory structure
      run: |
        mkdir -p charts_archive/2_2.build_song_catalog
    
    - name: 🚀 Run song catalog builder
      run: |
        python scripts/2_2.build_song_catalog.py
      env:
        GITHUB_ACTIONS: true
    
    - name: ✅ Verify results
      run: |
        echo "📊 Verifying execution results..."
        
        echo "📂 Contents of charts_archive/2_2.build_song_catalog/:"
        ls -lah charts_archive/2_2.build_song_catalog/
        
        echo -e "\n🎵 Catalog database:"
        if [ -f "charts_archive/2_2.build_song_catalog/build_song.db" ]; then
          SIZE=$(stat -c%s "charts_archive/2_2.build_song_catalog/build_song.db")
          echo "✅ build_song.db exists, size: $((SIZE / 1024)) KB"
          
          # Display number of records (requires sqlite3)
          COUNT=$(sqlite3 charts_archive/2_2.build_song_catalog/build_song.db "SELECT COUNT(*) FROM artist_track;")
          echo "📈 Total unique songs: $COUNT"
        else
          echo "⚠️ build_song.db not found"
        fi
    
    - name: 📤 Commit and push changes
      run: |
        echo "📝 Preparing commit..."
        
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # Only stage catalog files
        git add charts_archive/2_2.build_song_catalog/
        
        if git diff --cached --quiet; then
          echo "🔭 No changes to commit"
        else
          DATE=$(date +'%Y-%m-%d')
          WEEK=$(date +'%Y-W%W')
          git commit -m "🤖 Update song catalog ${DATE} (Week ${WEEK}) [Automated]"
          
          echo "⬇️ Pulling latest changes with rebase..."
          git pull --rebase origin main
          
          echo "⬆️ Pushing changes to repository..."
          git push origin HEAD:main
          echo "✅ Changes pushed successfully"
        fi
    
    - name: 📦 Upload catalog artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: song-catalog-${{ github.run_number }}
        path: |
          charts_archive/2_2.build_song_catalog/
        retention-days: ${{ env.RETENTION_DAYS }}
    
    - name: 📋 Final report
      if: always()
      run: |
        echo "========================================"
        echo "🎵 SONG CATALOG BUILD REPORT"
        echo "========================================"
        echo "📅 Date: $(date)"
        echo "📌 Trigger: ${{ github.event_name }}"
        echo ""
        if [ -f "charts_archive/2_2.build_song_catalog/build_song.db" ]; then
          COUNT=$(sqlite3 charts_archive/2_2.build_song_catalog/build_song.db "SELECT COUNT(*) FROM artist_track;")
          echo "✅ Total songs in catalog: $COUNT"
          echo "🤖 Database size: $(du -h charts_archive/2_2.build_song_catalog/build_song.db | cut -f1)"
        else
          echo "⚠️ Catalog database not found"
        fi
        echo "========================================"
