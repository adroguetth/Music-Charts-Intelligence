name: 3- Enrich Chart Data

on:
  schedule:
    # Lunes 14:00 UTC (1 hora después del workflow de descarga)
    - cron: '0 14 * * 1'
  
  # Ejecución manual desde la interfaz de GitHub
  workflow_dispatch:
  
  # Ejecución automática cuando termine el workflow de descarga
  workflow_run:
    workflows: ["1- Download YouTube Chart"]
    types:
      - completed
    branches:
      - main

env:
  RETENTION_DAYS: 30
  MAX_WEEKS: 78  # 1.5 años de retención

jobs:
  enrich-chart-data:
    name: Enrich YouTube Chart Data
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    permissions:
      contents: write
    
    steps:
    # ==================================================
    # SETUP PHASE
    # ==================================================
    - name: 📚 Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Full history for git operations
    
    - name: 🐍 Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: 'pip'
    
    - name: 📦 Install dependencies
      run: |
        pip install -r requirements.txt
    
    - name: 📁 Ensure directory structure
      run: |
        mkdir -p charts_archive/1_download-chart/databases
        mkdir -p charts_archive/3_enrich-chart-data
    
    # ==================================================
    # EXECUTION PHASE
    # ==================================================
    - name: 🚀 Run enrichment script
      run: |
        python scripts/3_enrich-chart-data.py
      env:
        YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        GITHUB_ACTIONS: true
    
    # ==================================================
    # VALIDATION PHASE
    # ==================================================
    - name: ✅ Verify enriched database
      run: |
        echo "📊 Verifying enriched database..."
        
        # Find the most recent enriched database
        LATEST_DB=$(ls -t charts_archive/3_enrich-chart-data/*_enriched.db 2>/dev/null | head -1)
        
        if [ -f "$LATEST_DB" ]; then
          SIZE=$(stat -c%s "$LATEST_DB")
          echo "✅ Enriched database found: $(basename $LATEST_DB)"
          echo "📦 Size: $((SIZE / 1024)) KB"
          
          # Quick integrity check
          if command -v sqlite3 &> /dev/null; then
            echo "🔍 Checking database integrity..."
            sqlite3 "$LATEST_DB" "PRAGMA integrity_check;"
            
            # Show basic stats
            TOTAL=$(sqlite3 "$LATEST_DB" "SELECT COUNT(*) FROM canciones_enriquecidas;")
            MULTI=$(sqlite3 "$LATEST_DB" "SELECT COUNT(*) FROM canciones_enriquecidas WHERE artist_country = 'Multipais';")
            ERROR=$(sqlite3 "$LATEST_DB" "SELECT COUNT(*) FROM canciones_enriquecidas WHERE error != '';")
            
            echo "📊 Stats: $TOTAL songs, $MULTI multi-country, $ERROR with errors"
          fi
        else
          echo "❌ No enriched database found!"
          exit 1
        fi
    
    # ==================================================
    # PERSISTENCE PHASE
    # ==================================================
    - name: 📤 Commit and push changes
      run: |
        echo "📝 Preparing commit..."
        
        # Configure git user for automated commits
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # Stage only enriched database files
        git add charts_archive/3_enrich-chart-data/
        
        # Check if there are changes to commit
        if git diff --cached --quiet; then
          echo "🔭 No changes to commit"
        else
          DATE=$(date +'%Y-%m-%d')
          WEEK=$(date +'%Y-W%W')
          git commit -m "🤖 Enriched chart data ${DATE} (Week ${WEEK}) [Automated]"
          
          # Pull latest changes with rebase to avoid merge commits
          echo "⬇️ Pulling latest changes with rebase..."
          git pull --rebase origin main
          
          echo "⬆️ Pushing changes to repository..."
          git push origin HEAD:main
          echo "✅ Changes pushed successfully"
        fi
    
    # ==================================================
    # CLEANUP PHASE - Keep only last 78 weeks
    # ==================================================
    - name: 🧹 Clean old enriched databases
      run: |
        echo "🗑️ Cleaning enriched databases older than ${{ env.MAX_WEEKS }} weeks..."
        
        # 78 semanas = 546 días
        find charts_archive/3_enrich-chart-data/ \
          -name "*_enriched.db" \
          -type f \
          -mtime +$((MAX_WEEKS * 7)) \
          -delete
        
        # Mostrar cuántas quedan
        REMAINING=$(ls -1 charts_archive/3_enrich-chart-data/*_enriched.db 2>/dev/null | wc -l)
        echo "✅ Cleanup completed. $REMAINING enriched databases remaining."
        
        # Opcional: listar las que se mantienen (solo nombres, no contenido)
        if [ $REMAINING -gt 0 ] && [ $REMAINING -le 10 ]; then
          echo ""
          echo "📋 Current enriched databases:"
          ls -1 charts_archive/3_enrich-chart-data/*_enriched.db 2>/dev/null | xargs -n 1 basename | sort
        elif [ $REMAINING -gt 10 ]; then
          echo ""
          echo "📋 $REMAINING databases retained (list suppressed for brevity)"
        fi
    
    # ==================================================
    # RECOVERY PHASE (on failure)
    # ==================================================
    - name: 📦 Upload debug artifacts
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: enrich-debug-${{ github.run_number }}
        path: |
          charts_archive/3_enrich-chart-data/
          scripts/3_enrich-chart-data.py.log
        retention-days: 7
    
    # ==================================================
    # REPORTING PHASE
    # ==================================================
    - name: 📋 Generate final report
      if: always()
      run: |
        echo "========================================"
        echo "🎵 ENRICHMENT EXECUTION REPORT"
        echo "========================================"
        echo "📅 Date: $(date)"
        echo "📌 Trigger: ${{ github.event_name }}"
        echo "🔗 Commit: ${{ github.sha }}"
        echo ""
        
        # Find latest enriched database
        LATEST_DB=$(ls -t charts_archive/3_enrich-chart-data/*_enriched.db 2>/dev/null | head -1)
        
        if [ -f "$LATEST_DB" ]; then
          echo "✅ Latest database: $(basename $LATEST_DB)"
          
          if command -v sqlite3 &> /dev/null; then
            # Detailed stats
            sqlite3 "$LATEST_DB" <<EOF
            .mode box
            WITH stats AS (
              SELECT 
                COUNT(*) as total,
                SUM(CASE WHEN artist_country = 'Multipais' THEN 1 ELSE 0 END) as multi_country,
                SUM(CASE WHEN artist_country = 'Desconocido' THEN 1 ELSE 0 END) as unknown_country,
                SUM(CASE WHEN error != '' THEN 1 ELSE 0 END) as with_errors,
                COUNT(DISTINCT artist_country) as unique_countries,
                COUNT(DISTINCT macro_genre) as unique_genres
              FROM canciones_enriquecidas
            )
            SELECT 
              total as 'Total Songs',
              multi_country as 'Multi-Country',
              unknown_country as 'Unknown Country',
              with_errors as 'With Errors',
              unique_countries as 'Unique Countries',
              unique_genres as 'Unique Genres'
            FROM stats;
            EOF
          fi
        else
          echo "⚠️ No enriched database found"
        fi
        
        # Show retention info
        echo ""
        echo "📊 Retention policy:"
        echo "   • Maximum weeks: ${{ env.MAX_WEEKS }} (1.5 years)"
        echo "   • Current count: $(ls -1 charts_archive/3_enrich-chart-data/*_enriched.db 2>/dev/null | wc -l) databases"
        
        # Show trigger information
        echo ""
        echo "📊 Trigger details:"
        if [ "${{ github.event_name }}" = "workflow_run" ]; then
          echo "   • Triggered by: Download workflow"
          echo "   • Workflow status: ${{ github.event.workflow_run.conclusion }}"
          echo "   • Workflow ID: ${{ github.event.workflow_run.id }}"
        elif [ "${{ github.event_name }}" = "schedule" ]; then
          echo "   • Triggered by: Scheduled cron (Monday 14:00 UTC)"
        else
          echo "   • Triggered by: Manual dispatch"
        fi
        
        echo ""
        echo "✅ Process completed"
        echo "========================================"
