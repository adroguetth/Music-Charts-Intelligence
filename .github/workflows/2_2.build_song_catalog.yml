name: 2.2 - Build Song Catalog

on:
  schedule:
    # Run every Monday at 13:15 UTC (after Script 1 and Script 2.1)
    - cron: '15 13 * * 1'
  
  workflow_dispatch:
  
env:
  RETENTION_DAYS: 90

jobs:
  build-catalog:
    name: Build and Enrich Song Catalog
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    permissions:
      contents: write
    
    steps:
    - name: 📚 Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: 🐍 Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: 'pip'
    
    - name: 📦 Install dependencies
      run: |
        # Only Python standard library required - no external dependencies
        echo "✅ No external dependencies required"
        echo "Python version: $(python --version)"
    
    - name: 📁 Create directory structure
      run: |
        mkdir -p charts_archive/2_2.build-song-catalog
    
    - name: 🔍 Verify prerequisites
      run: |
        echo "🔍 Checking prerequisite files..."
        
        # Check artist metadata database (required for country/genre resolution)
        if [ ! -f "charts_archive/2_1.countries-genres-artist/artist_countries_genres.db" ]; then
          echo "❌ Artist metadata database not found at charts_archive/2_1.countries-genres-artist/artist_countries_genres.db"
          echo "   Please ensure script 2_1 has run successfully before this workflow."
          exit 1
        fi
        echo "✅ Artist metadata database found"
        
        # Check for chart databases
        DB_COUNT=$(find charts_archive/1_download-chart/databases -name "*.db" 2>/dev/null | wc -l)
        if [ "$DB_COUNT" -eq 0 ]; then
          echo "❌ No chart databases found in charts_archive/1_download-chart/databases/"
          echo "   Please ensure script 1 has run successfully before this workflow."
          exit 1
        fi
        echo "✅ Found $DB_COUNT chart database(s)"
        
        # Show latest database
        LATEST_DB=$(ls -t charts_archive/1_download-chart/databases/*.db 2>/dev/null | head -1)
        echo "📆 Latest chart database: $(basename "$LATEST_DB")"
    
    - name: 📊 Pre-execution catalog status
      run: |
        echo "📊 Current catalog status (before execution):"
        if [ -f "charts_archive/2_2.build-song-catalog/build_song.db" ]; then
          SIZE=$(stat -c%s "charts_archive/2_2.build-song-catalog/build_song.db")
          echo "   📀 Database size: $((SIZE / 1024)) KB"
          
          COUNT=$(sqlite3 charts_archive/2_2.build-song-catalog/build_song.db "SELECT COUNT(*) FROM artist_track;" 2>/dev/null || echo "N/A")
          echo "   🎵 Total songs: $COUNT"
          
          # Check for NULL/Unknown values in existing catalog
          if [ "$COUNT" != "N/A" ] && [ "$COUNT" -gt 0 ]; then
            INCOMPLETE=$(sqlite3 charts_archive/2_2.build-song-catalog/build_song.db "
              SELECT COUNT(*) FROM artist_track 
              WHERE artist_country IS NULL 
                 OR artist_country = '' 
                 OR artist_country = 'Unknown'
                 OR macro_genre IS NULL 
                 OR macro_genre = '' 
                 OR macro_genre = 'Unknown';
            " 2>/dev/null || echo "0")
            echo "   ⚠️  Incomplete records: $INCOMPLETE"
          fi
        else
          echo "   ℹ️  Catalog does not exist yet - will be created"
        fi
    
    - name: 🚀 Run song catalog builder
      run: |
        python scripts/2_2.build_song_catalog.py
      env:
        GITHUB_ACTIONS: true
    
    - name: 📊 Post-execution catalog status
      run: |
        echo "📊 Updated catalog status (after execution):"
        if [ -f "charts_archive/2_2.build-song-catalog/build_song.db" ]; then
          SIZE=$(stat -c%s "charts_archive/2_2.build-song-catalog/build_song.db")
          echo "   📀 Database size: $((SIZE / 1024)) KB"
          
          COUNT=$(sqlite3 charts_archive/2_2.build-song-catalog/build_song.db "SELECT COUNT(*) FROM artist_track;")
          echo "   🎵 Total songs: $COUNT"
          
          # Show statistics about resolved data
          COMPLETE=$(sqlite3 charts_archive/2_2.build-song-catalog/build_song.db "
            SELECT COUNT(*) FROM artist_track 
            WHERE artist_country IS NOT NULL 
              AND artist_country != '' 
              AND artist_country != 'Unknown'
              AND macro_genre IS NOT NULL 
              AND macro_genre != '' 
              AND macro_genre != 'Unknown';
          ")
          echo "   ✅ Complete records: $COMPLETE ($(( COMPLETE * 100 / COUNT ))%)"
          
          # Show country distribution
          echo "   🌍 Top 5 countries:"
          sqlite3 charts_archive/2_2.build-song-catalog/build_song.db "
            SELECT artist_country, COUNT(*) as cnt 
            FROM artist_track 
            WHERE artist_country NOT IN ('Unknown', 'Multi-country')
            GROUP BY artist_country 
            ORDER BY cnt DESC 
            LIMIT 5;
          " | while IFS='|' read country cnt; do
            echo "      • $country: $cnt songs"
          done
          
          # Show genre distribution
          echo "   🎵 Top 5 genres:"
          sqlite3 charts_archive/2_2.build-song-catalog/build_song.db "
            SELECT macro_genre, COUNT(*) as cnt 
            FROM artist_track 
            WHERE macro_genre NOT IN ('Unknown', 'Multi-genre')
            GROUP BY macro_genre 
            ORDER BY cnt DESC 
            LIMIT 5;
          " | while IFS='|' read genre cnt; do
            echo "      • $genre: $cnt songs"
          done
        else
          echo "   ❌ Catalog database not created"
          exit 1
        fi
    
    - name: 📂 List output directory
      run: |
        echo "📂 Contents of charts_archive/2_2.build-song-catalog/:"
        ls -lah charts_archive/2_2.build-song-catalog/
    
    - name: 📤 Commit and push changes
      run: |
        echo "📝 Preparing commit..."
        
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # Stage catalog files
        git add charts_archive/2_2.build-song-catalog/
        
        if git diff --cached --quiet; then
          echo "🔭 No changes to commit"
        else
          # Get statistics for commit message
          if [ -f "charts_archive/2_2.build-song-catalog/build_song.db" ]; then
            TOTAL=$(sqlite3 charts_archive/2_2.build-song-catalog/build_song.db "SELECT COUNT(*) FROM artist_track;")
            NEW=$(git diff --cached --numstat | awk '{sum+=$1} END {print sum}')
          else
            TOTAL="N/A"
            NEW="N/A"
          fi
          
          DATE=$(date +'%Y-%m-%d')
          WEEK=$(date +'%Y-W%W')
          git commit -m "🤖 Update song catalog ${DATE} (Week ${WEEK}) [Automated]
          
          📊 Catalog statistics:
          • Total songs: ${TOTAL}
          • Changes detected: ${NEW} modifications
          
          🔄 This update includes:
          • New songs added from latest weekly chart
          • Country/genre resolution for incomplete records"
          
          echo "⬇️ Pulling latest changes with rebase..."
          git pull --rebase origin main
          
          echo "⬆️ Pushing changes to repository..."
          git push origin HEAD:main
          echo "✅ Changes pushed successfully"
        fi
    
    - name: 📦 Upload catalog artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: song-catalog-${{ github.run_number }}
        path: |
          charts_archive/2_2.build-song-catalog/
          scripts/2_2.build_song_catalog.py
        retention-days: ${{ env.RETENTION_DAYS }}
    
    - name: 📋 Final report
      if: always()
      run: |
        echo "========================================"
        echo "🎵 SONG CATALOG BUILD REPORT"
        echo "========================================"
        echo "📅 Date: $(date)"
        echo "📌 Trigger: ${{ github.event_name }}"
        echo "🔗 Run ID: ${{ github.run_id }}"
        echo ""
        
        if [ -f "charts_archive/2_2.build-song-catalog/build_song.db" ]; then
          echo "📊 CATALOG STATISTICS:"
          
          TOTAL=$(sqlite3 charts_archive/2_2.build-song-catalog/build_song.db "SELECT COUNT(*) FROM artist_track;")
          echo "   🎵 Total unique songs: $TOTAL"
          
          COMPLETE=$(sqlite3 charts_archive/2_2.build-song-catalog/build_song.db "
            SELECT COUNT(*) FROM artist_track 
            WHERE artist_country NOT IN ('Unknown', '') 
              AND macro_genre NOT IN ('Unknown', '');
          " 2>/dev/null || echo "0")
          echo "   ✅ Complete records: $COMPLETE ($(( COMPLETE * 100 / TOTAL ))%)"
          
          MULTI=$(sqlite3 charts_archive/2_2.build-song-catalog/build_song.db "
            SELECT COUNT(*) FROM artist_track WHERE artist_country = 'Multi-country';
          ")
          echo "   🌐 Multi-country collaborations: $MULTI ($(( MULTI * 100 / TOTAL ))%)"
          
          UNIQUE_COUNTRIES=$(sqlite3 charts_archive/2_2.build-song-catalog/build_song.db "
            SELECT COUNT(DISTINCT artist_country) FROM artist_track 
            WHERE artist_country NOT IN ('Unknown', 'Multi-country');
          ")
          echo "   🌍 Distinct countries represented: $UNIQUE_COUNTRIES"
          
          UNIQUE_GENRES=$(sqlite3 charts_archive/2_2.build-song-catalog/build_song.db "
            SELECT COUNT(DISTINCT macro_genre) FROM artist_track 
            WHERE macro_genre NOT IN ('Unknown', 'Multi-genre');
          ")
          echo "   🎵 Distinct genres: $UNIQUE_GENRES"
          
          echo ""
          echo "📀 DATABASE INFO:"
          echo "   📂 Location: charts_archive/2_2.build-song-catalog/build_song.db"
          echo "   💾 Size: $(du -h charts_archive/2_2.build-song-catalog/build_song.db | cut -f1)"
          echo "   🔑 Highest ID: $(sqlite3 charts_archive/2_2.build-song-catalog/build_song.db "SELECT MAX(id) FROM artist_track;")"
          
          echo ""
          echo "🏆 TOP 3 ARTISTS BY SONG COUNT:"
          sqlite3 charts_archive/2_2.build-song-catalog/build_song.db "
            SELECT artist_names, COUNT(*) as cnt 
            FROM artist_track 
            GROUP BY artist_names 
            ORDER BY cnt DESC 
            LIMIT 3;
          " | while IFS='|' read artist cnt; do
            ARTIST_SHORT=$(echo "$artist" | cut -c1-50)
            echo "   • $ARTIST_SHORT: $cnt songs"
          done
        else
          echo "❌ Catalog database not found"
        fi
        
        echo ""
        echo "📁 ARTIFACT INFO:"
        echo "   📦 Artifact name: song-catalog-${{ github.run_number }}"
        echo "   💾 Retention: ${{ env.RETENTION_DAYS }} days"
        echo "========================================"
