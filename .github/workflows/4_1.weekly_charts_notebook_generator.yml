name: 4.1- Weekly Music Charts Notebook Generator

on:
  schedule:
    # Run every Monday at 15:00 UTC
    - cron: '0 15 * * 1'
  workflow_dispatch:
    inputs:
      week:
        description: 'Specific week to process (format: YYYY-WXX)'
        required: false
        type: string
      language:
        description: 'Language to generate'
        required: false
        default: 'both'
        type: choice
        options:
          - both
          - en
          - es

env:
  DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

jobs:
  generate-notebooks:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      # Step 1: Checkout repository
      - name: 📚 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      # Step 2: Set up Python environment
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          
      # Step 3: Install Python dependencies
      - name: 📦 Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install pandas numpy matplotlib seaborn plotly scipy requests
          pip install jupyter nbconvert
          
      # Step 4: Install LaTeX for PDF conversion
      - name: 🔤 Install LaTeX for PDF conversion
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            texlive-xetex \
            texlive-fonts-recommended \
            texlive-plain-generic \
            fonts-freefont-otf
          
      # Step 5: Determine week to process
      - name: 📅 Determine week to process
        id: get_week
        run: |
          if [ -n "${{ github.event.inputs.week }}" ]; then
            echo "week=${{ github.event.inputs.week }}" >> $GITHUB_OUTPUT
            echo "language=${{ github.event.inputs.language }}" >> $GITHUB_OUTPUT
          else
            # Get latest week from charts_archive
            LATEST_DB=$(ls -1 charts_archive/3_enrich-chart-data/youtube_charts_*.db 2>/dev/null | sort -r | head -1)
            if [ -z "$LATEST_DB" ]; then
              echo "No database found in charts_archive"
              exit 1
            fi
            WEEK=$(basename "$LATEST_DB" | sed 's/youtube_charts_\(.*\)_enriched.db/\1/')
            echo "week=$WEEK" >> $GITHUB_OUTPUT
            echo "language=both" >> $GITHUB_OUTPUT
          fi
          
      # Step 6: Execute notebook generator script
      - name: 🚀 Run notebook generator
        run: |
          python scripts/4_1.weekly_charts_notebook_generator.py \
            --week ${{ steps.get_week.outputs.week }} \
            --language ${{ steps.get_week.outputs.language }}
          
      # Step 7: Convert notebooks to PDF
      - name: 📄 Convert notebooks to PDF
        run: |
          # Create PDF output directories
          mkdir -p pdf_output/EN
          mkdir -p pdf_output/ES
          
          # Convert English notebooks
          for notebook in Notebook_EN/weekly/*.ipynb; do
            if [ -f "$notebook" ]; then
              echo "Converting $notebook to PDF..."
              jupyter nbconvert --to pdf "$notebook" --output-dir=pdf_output/EN/
            fi
          done
          
          # Convert Spanish notebooks
          for notebook in Notebook_ES/weekly/*.ipynb; do
            if [ -f "$notebook" ]; then
              echo "Converting $notebook to PDF..."
              jupyter nbconvert --to pdf "$notebook" --output-dir=pdf_output/ES/
            fi
          done
          
      # Step 8: Upload PDFs to Google Drive
      - name: ☁️ Upload PDFs to Google Drive
        env:
          GDRIVE_SERVICE_ACCOUNT: ${{ secrets.GDRIVE_SERVICE_ACCOUNT }}
          GDRIVE_ROOT_FOLDER_ID: ${{ secrets.GDRIVE_ROOT_FOLDER_ID }}
          WEEK: ${{ steps.get_week.outputs.week }}
        run: |
          python scripts/upload_to_drive.py
          
      # Step 9: Keep only last 6 notebooks locally
      - name: 🧹 Keep only last 6 notebooks locally
        run: |
          # Keep only last 6 notebooks in EN directory
          cd Notebook_EN/weekly
          ls -1 *.ipynb 2>/dev/null | sort -r | tail -n +7 | xargs -r rm -f
          cd ../..
          
          # Keep only last 6 notebooks in ES directory
          cd Notebook_ES/weekly
          ls -1 *.ipynb 2>/dev/null | sort -r | tail -n +7 | xargs -r rm -f
          cd ../..
          
          # Keep only last 6 cache files for EN
          cd Notebook_EN/weekly/cache
          ls -1 *.json 2>/dev/null | sort -r | tail -n +7 | xargs -r rm -f
          cd ../../../..
          
          # Keep only last 6 cache files for ES
          cd Notebook_ES/weekly/cache
          ls -1 *.json 2>/dev/null | sort -r | tail -n +7 | xargs -r rm -f
          cd ../../../..
          
          echo "✅ Cleanup completed: Keeping only last 6 notebooks per language"
          
      # Step 10: Commit and push changes to repository
      - name: 📤 Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add Notebook_EN/weekly/ Notebook_ES/weekly/
          
          if git diff --staged --quiet; then
            echo "🔭 No changes to commit"
          else
            git commit -m "Weekly charts analysis - ${{ steps.get_week.outputs.week }} [skip ci]"
            git push
            echo "✅ Changes pushed successfully"
          fi
          
      # Step 11: Generate final execution report
      - name: 📋 Summary
        run: |
          echo "=========================================="
          echo "🎵 WEEKLY CHARTS ANALYSIS COMPLETE!"
          echo "=========================================="
          echo "📅 Week: ${{ steps.get_week.outputs.week }}"
          echo "🌐 Language: ${{ steps.get_week.outputs.language }}"
          echo ""
          echo "📂 Generated files:"
          echo "  - 📓 Notebooks in Notebook_EN/weekly/ and Notebook_ES/weekly/"
          echo "  - 📄 PDFs uploaded to Google Drive"
          echo "  - 🗂️ Only last 6 notebooks retained locally"
          echo "=========================================="
