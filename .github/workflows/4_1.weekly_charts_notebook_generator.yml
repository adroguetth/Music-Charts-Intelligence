name: Weekly Music Charts Notebook Generator

on:
  schedule:
    - cron: '0 15 * * 1'
  workflow_dispatch:
    inputs:
      week:
        description: 'Specific week to process (format: YYYY-WXX)'
        required: false
        type: string
      language:
        description: 'Language to generate'
        required: false
        default: 'both'
        type: choice
        options:
          - both
          - en
          - es

# Add write permissions
permissions:
  contents: write

env:
  DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

jobs:
  generate-notebooks:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install pandas numpy matplotlib seaborn plotly scipy requests
          pip install jupyter

      - name: Determine week to process
        id: get_week
        run: |
          if [ -n "${{ github.event.inputs.week }}" ]; then
            echo "week=${{ github.event.inputs.week }}" >> $GITHUB_OUTPUT
            echo "language=${{ github.event.inputs.language }}" >> $GITHUB_OUTPUT
          else
            LATEST_DB=$(ls -1 charts_archive/3_enrich-chart-data/youtube_charts_*.db 2>/dev/null | sort -r | head -1)
            if [ -z "$LATEST_DB" ]; then
              echo "No database found in charts_archive"
              exit 1
            fi
            WEEK=$(basename "$LATEST_DB" | sed 's/youtube_charts_\(.*\)_enriched.db/\1/')
            echo "week=$WEEK" >> $GITHUB_OUTPUT
            echo "language=both" >> $GITHUB_OUTPUT
          fi

      - name: Run notebook generator
        run: |
          python scripts/4_1.weekly_charts_notebook_generator.py \
            --week ${{ steps.get_week.outputs.week }} \
            --language ${{ steps.get_week.outputs.language }}

      - name: Keep only last 6 notebooks locally
        run: |
          # English notebooks
          cd Notebook_EN/weekly
          ls -1 *.ipynb 2>/dev/null | sort -r | tail -n +7 | xargs -r rm -f
          cd ../..

          # Spanish notebooks
          cd Notebook_ES/weekly
          ls -1 *.ipynb 2>/dev/null | sort -r | tail -n +7 | xargs -r rm -f
          cd ../..

          # English cache (create dir if not exists)
          mkdir -p Notebook_EN/weekly/cache
          cd Notebook_EN/weekly/cache
          ls -1 *.json 2>/dev/null | sort -r | tail -n +7 | xargs -r rm -f
          cd ../../../..

          # Spanish cache (create dir if not exists)
          mkdir -p Notebook_ES/weekly/cache
          cd Notebook_ES/weekly/cache
          ls -1 *.json 2>/dev/null | sort -r | tail -n +7 | xargs -r rm -f
          cd ../../../..

          echo "Cleaned up: Keeping only last 6 notebooks per language"

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add Notebook_EN/weekly/ Notebook_ES/weekly/

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Weekly charts analysis - ${{ steps.get_week.outputs.week }} [skip ci]"
            git push
          fi

      - name: Summary
        run: |
          echo "=========================================="
          echo "Weekly Charts Analysis Complete!"
          echo "=========================================="
          echo "Week: ${{ steps.get_week.outputs.week }}"
          echo "Language: ${{ steps.get_week.outputs.language }}"
          echo ""
          echo "Generated files:"
          echo "  - Notebooks in Notebook_EN/weekly/ and Notebook_ES/weekly/"
          echo "  - Only last 6 notebooks retained locally"
          echo "=========================================="
