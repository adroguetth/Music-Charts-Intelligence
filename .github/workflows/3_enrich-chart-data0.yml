name: 3- Enrich Chart Data (respardo)

on:
  schedule:
    # Run every Monday at 14:00 UTC (2 hours after download workflow)
    # - cron: '0 14 * * 1'
  
  # Allow manual workflow execution
  workflow_dispatch:
  
  # Trigger on push to main branch if enrichment script changes
  push:
    branches:
      - main
    paths:
      - 'scripts/3_enrich_chart_data.py'
      - '.github/workflows/3_enrich-chart-data.yml'

env:
  # Number of weeks to retain enriched databases (1.5 years)
  RETENTION_WEEKS: 78

jobs:
  enrich-chart-data:
    name: Enrich YouTube Chart Data
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    # Required permissions for committing changes
    permissions:
      contents: write
    
    steps:
    # Step 1: Checkout repository
    - name: 📚 Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Full history for proper git operations
    
    # Step 2: Set up Python environment
    - name: 🐍 Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: 'pip'  # Cache pip dependencies for faster builds
    
    # Step 3: Install Python dependencies
    - name: 📦 Install dependencies
      run: |
        pip install -r requirements.txt
    
    # Step 4: Create required directory structure
    - name: 📁 Create directory structure
      run: |
        mkdir -p charts_archive/1_download-chart/databases
        mkdir -p charts_archive/3_enrich-chart-data
    
    # Step 5: Execute enrichment script
    - name: 🚀 Run enrichment script
      run: |
        python scripts/3_enrich_chart_data.py
      env:
        YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        GITHUB_ACTIONS: true
    
    # Step 6: Verify execution results
    - name: ✅ Verify results
      run: |
        echo "📊 Verifying execution results..."
        
        echo "📂 Contents of charts_archive/3_enrich-chart-data/:"
        ls -lah charts_archive/3_enrich-chart-data/
        
        echo -e "\n🗃️ Enriched databases:"
        ls -lah charts_archive/3_enrich-chart-data/*_enriched.db 2>/dev/null || echo "No enriched databases found"
        
        echo -e "\n📈 File statistics:"
        find charts_archive/3_enrich-chart-data -type f -exec ls -lh {} \; | awk '{print $5, $9}' 2>/dev/null || echo "No files found"
    
    # Step 7: Commit and push changes to repository
    - name: 📤 Commit and push changes
      run: |
        echo "📝 Preparing commit..."
        
        # Configure git user for automated commits
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # Stage only enriched database files
        git add charts_archive/3_enrich-chart-data/
        
        # Check if there are changes to commit
        if git diff --cached --quiet; then
          echo "🔭 No changes to commit"
        else
          DATE=$(date +'%Y-%m-%d')
          WEEK=$(date +'%Y-W%W')
          git commit -m "🤖 Enriched chart data ${DATE} (Week ${WEEK}) [Automated]"
          
          # 🔥 IMPORTANTE: Pull latest changes before pushing
          echo "⬇️ Pulling latest changes with rebase..."
          git pull --rebase origin main
          
          echo "⬆️ Pushing changes to repository..."
          git push origin HEAD:main
          echo "✅ Changes pushed successfully"
        fi
    
    # Step 8: Upload artifacts for debugging (only on failure)
    - name: 📦 Upload artifacts (on failure)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: enrich-debug-${{ github.run_number }}
        path: |
          scripts/3_enrich_chart_data.py.log
          charts_archive/3_enrich-chart-data/
        retention-days: 7
    
    # Step 9: Clean old enriched databases (keep only last 78 weeks)
    - name: 🧹 Clean old databases
      run: |
        echo "🧹 Cleaning enriched databases older than ${{ env.RETENTION_WEEKS }} weeks..."
        
        # Calculate days (78 weeks * 7 days = 546 days)
        find charts_archive/3_enrich-chart-data/ \
          -name "*_enriched.db" \
          -type f \
          -mtime +$((RETENTION_WEEKS * 7)) \
          -delete
        
        echo "✅ Cleanup completed"
    
    # Step 10: Generate final execution report
    - name: 📋 Final report
      if: always()
      run: |
        echo "========================================"
        echo "🎵 ENRICHMENT EXECUTION REPORT"
        echo "========================================"
        echo "📅 Date: $(date)"
        echo "📌 Trigger: ${{ github.event_name }}"
        echo "🔗 Commit: ${{ github.sha }}"
        echo ""
        
        # Find the most recent enriched database
        LATEST_DB=$(ls -t charts_archive/3_enrich-chart-data/*_enriched.db 2>/dev/null | head -1)
        
        if [ -f "$LATEST_DB" ]; then
          echo "✅ Latest enriched database: $(basename $LATEST_DB)"
          SIZE=$(stat -c%s "$LATEST_DB")
          echo "📊 Size: $((SIZE / 1024)) KB"
          
          # Show basic stats if sqlite3 is available
          if command -v sqlite3 &> /dev/null; then
            echo ""
            echo "📊 Database statistics:"
            TOTAL=$(sqlite3 "$LATEST_DB" "SELECT COUNT(*) FROM canciones_enriquecidas;" 2>/dev/null || echo "N/A")
            MULTI=$(sqlite3 "$LATEST_DB" "SELECT COUNT(*) FROM canciones_enriquecidas WHERE artist_country = 'Multipais';" 2>/dev/null || echo "N/A")
            ERROR=$(sqlite3 "$LATEST_DB" "SELECT COUNT(*) FROM canciones_enriquecidas WHERE error != '';" 2>/dev/null || echo "N/A")
            
            echo "   • Total songs: $TOTAL"
            echo "   • Multi-country: $MULTI"
            echo "   • With errors: $ERROR"
          fi
        else
          echo "⚠️ No enriched database found"
        fi
        
        # Count total enriched databases
        TOTAL_DBS=$(find charts_archive/3_enrich-chart-data -name "*_enriched.db" 2>/dev/null | wc -l)
        if [ "$TOTAL_DBS" -gt 0 ]; then
          echo ""
          echo "📦 Total enriched databases: $TOTAL_DBS"
          echo "📊 Retention policy: ${{ env.RETENTION_WEEKS }} weeks (1.5 years)"
        fi
        
        echo ""
        echo "✅ Process completed"
        echo "========================================"
