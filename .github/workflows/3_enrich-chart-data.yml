name: 3- Enrich Chart Data

on:
  schedule:
    - cron: '0 14 * * 1'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'scripts/3_enrich_chart_data.py'
      - '.github/workflows/3_enrich-chart-data.yml'

env:
  RETENTION_WEEKS: 78

jobs:
  enrich-chart-data:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create directories
        run: |
          mkdir -p charts_archive/1_download-chart/databases
          mkdir -p charts_archive/3_enrich-chart-data

      - name: Run enrichment script
        run: python scripts/3_enrich_chart_data.py
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          GITHUB_ACTIONS: true

      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add charts_archive/3_enrich-chart-data/
          if ! git diff --cached --quiet; then
            git commit -m "🤖 Enriched chart data $(date +'%Y-%m-%d')"
            git pull --rebase origin main
            git push origin HEAD:main
          fi

      - name: Clean old databases
        run: |
          find charts_archive/3_enrich-chart-data/ -name "*_enriched.db" -type f -mtime +$((78*7)) -delete

      - name: Final report
        if: always()
        run: |
          echo "========================================"
          echo "🎵 ENRICHMENT REPORT"
          echo "========================================"
          echo "Date: $(date)"
          echo "Trigger: ${{ github.event_name }}"
          echo ""
          ls -la charts_archive/3_enrich-chart-data/ || echo "No databases yet"
          echo ""
          echo "✅ Done"
