name: 3- Enrich Chart Data

on:
  schedule:
    # Lunes 14:00 UTC (1 hora después del workflow de descarga)
    - cron: '0 14 * * 1'

  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - 'scripts/3_enrich_chart_data.py'
      - '.github/workflows/3_enrich-chart-data.yml'

env:
  RETENTION_WEEKS: 78

jobs:
  enrich-chart-data:
    name: Enrich YouTube Chart Data
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: write

    steps:

      # ==================================================
      # SETUP PHASE
      # ==================================================
      - name: 📚 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: 📦 Install dependencies
        run: |
          pip install -r requirements.txt

      - name: 📁 Ensure directory structure
        run: |
          mkdir -p charts_archive/1_download-chart/databases
          mkdir -p charts_archive/3_enrich-chart-data


      # ==================================================
      # DEBUG PHASE
      # ==================================================
      - name: 🔍 Debug - List directories
        run: |
          echo "📂 Contenido de scripts/:"
          ls -la scripts/ || echo "scripts/ no encontrado"

          echo ""
          echo "📂 Bases de datos de entrada disponibles:"
          ls -la charts_archive/1_download-chart/databases/ || echo "Vacío"

          echo ""
          echo "🐍 Python version:"
          python --version


      # ==================================================
      # EXECUTION PHASE
      # ==================================================
      - name: 🚀 Run enrichment script
        run: |
          python scripts/3_enrich_chart_data.py
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          GITHUB_ACTIONS: true


      # ==================================================
      # VALIDATION PHASE
      # ==================================================
      - name: ✅ Verify enriched database
        run: |
          echo "📊 Verifying enriched database..."

          LATEST_DB=$(ls -t charts_archive/3_enrich-chart-data/*_enriched.db 2>/dev/null | head -1)

          if [ -f "$LATEST_DB" ]; then

            SIZE=$(stat -c%s "$LATEST_DB")

            echo "✅ Enriched database found: $(basename $LATEST_DB)"
            echo "📦 Size: $((SIZE / 1024)) KB"

            if command -v sqlite3 &> /dev/null; then

              echo "🔍 Checking database integrity..."
              sqlite3 "$LATEST_DB" "PRAGMA integrity_check;"

              TOTAL=$(sqlite3 "$LATEST_DB" "SELECT COUNT(*) FROM canciones_enriquecidas;")
              MULTI=$(sqlite3 "$LATEST_DB" "SELECT COUNT(*) FROM canciones_enriquecidas WHERE artist_country = 'Multipais';")
              ERROR=$(sqlite3 "$LATEST_DB" "SELECT COUNT(*) FROM canciones_enriquecidas WHERE error != '';")

              echo "📊 Stats: $TOTAL songs, $MULTI multi-country, $ERROR with errors"

            fi

          else

            echo "❌ No enriched database found!"
            exit 1

          fi


      # ==================================================
      # PERSISTENCE PHASE
      # ==================================================
      - name: 📤 Commit and push changes
        run: |
          echo "📝 Preparing commit..."

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add charts_archive/3_enrich-chart-data/

          if git diff --cached --quiet; then

            echo "🔭 No changes to commit"

          else

            DATE=$(date +'%Y-%m-%d')
            WEEK=$(date +'%Y-W%W')

            git commit -m "🤖 Enriched chart data ${DATE} (Week ${WEEK}) [Automated]"
            git pull --rebase origin main
            git push origin HEAD:main

            echo "✅ Changes pushed successfully"

          fi


      # ==================================================
      # CLEANUP PHASE
      # ==================================================
      - name: 🧹 Clean old enriched databases
        run: |
          echo "🗑️ Cleaning enriched databases older than ${{ env.RETENTION_WEEKS }} weeks..."

          find charts_archive/3_enrich-chart-data/ \
            -name "*_enriched.db" \
            -type f \
            -mtime +$((RETENTION_WEEKS * 7)) \
            -delete

          REMAINING=$(ls -1 charts_archive/3_enrich-chart-data/*_enriched.db 2>/dev/null | wc -l)

          echo "✅ Cleanup completed. $REMAINING enriched databases remaining."


      # ==================================================
      # RECOVERY PHASE
      # ==================================================
      - name: 📦 Upload debug artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: enrich-debug-${{ github.run_number }}
          path: |
            charts_archive/3_enrich-chart-data/
            scripts/3_enrich_chart_data.py.log
          retention-days: 7


      # ==================================================
      # REPORTING PHASE
      # ==================================================
      - name: 📋 Generate final report
        if: always()
        run: |

          echo "========================================"
          echo "🎵 ENRICHMENT EXECUTION REPORT"
          echo "========================================"

          echo "📅 Date: $(date)"
          echo "📌 Trigger: ${{ github.event_name }}"
          echo "🔗 Commit: ${{ github.sha }}"
          echo ""

          LATEST_DB=$(ls -t charts_archive/3_enrich-chart-data/*_enriched.db 2>/dev/null | head -1)

          if [ -f "$LATEST_DB" ]; then

            echo "✅ Latest database: $(basename $LATEST_DB)"

            if command -v sqlite3 &> /dev/null; then

              sqlite3 "$LATEST_DB" <<EOF
.mode box
WITH stats AS (
  SELECT 
    COUNT(*) as total,
    SUM(CASE WHEN artist_country = 'Multipais' THEN 1 ELSE 0 END) as multi_country,
    SUM(CASE WHEN artist_country = 'Desconocido' THEN 1 ELSE 0 END) as unknown_country,
    SUM(CASE WHEN error != '' THEN 1 ELSE 0 END) as with_errors,
    COUNT(DISTINCT artist_country) as unique_countries,
    COUNT(DISTINCT macro_genre) as unique_genres
  FROM canciones_enriquecidas
)
SELECT 
  total as "Total Songs",
  multi_country as "Multi-Country",
  unknown_country as "Unknown Country",
  with_errors as "With Errors",
  unique_countries as "Unique Countries",
  unique_genres as "Unique Genres"
FROM stats;
EOF

            fi

          else

            echo "⚠️ No enriched database found"

          fi

          echo ""
          echo "📊 Retention policy:"
          echo "   • Maximum weeks: ${{ env.RETENTION_WEEKS }} (1.5 years)"
          echo "   • Current count: $(ls -1 charts_archive/3_enrich-chart-data/*_enriched.db 2>/dev/null | wc -l) databases"

          echo ""
          echo "📊 Trigger details:"

          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "   • Triggered by: Scheduled cron (Monday 14:00 UTC)"
          elif [ "${{ github.event_name }}" = "push" ]; then
            echo "   • Triggered by: Push to main (script update)"
          else
            echo "   • Triggered by: Manual dispatch"
          fi

          echo ""
          echo "✅ Process completed"
          echo "========================================"
